<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Chrome – PNG Glyph Composer</title>
<style>
  :root {
    --bg: #000000;
    --fg: #f4f2ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.4s ease;
  }
  body.cream {
    --bg: #e8e4dc;
    --fg: #1a1a1a;
  }
  header {
    padding: 20px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    border-bottom: 1px solid rgba(128,128,128,0.25);
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.7; margin-right: auto; }
  input[type="text"] {
    background: rgba(128,128,128,0.12);
    border: 1px solid rgba(128,128,128,0.35);
    color: inherit;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 16px;
    width: 280px;
    outline: none;
  }
  input[type="text"]:focus { border-color: rgba(128,128,128,0.7); }
  label { font-size: 12px; opacity: 0.7; display: flex; align-items: center; gap: 8px; }
  button {
    background: rgba(128,128,128,0.15);
    border: 1px solid rgba(128,128,128,0.35);
    color: inherit;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { background: rgba(128,128,128,0.3); }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    overflow: auto;
  }
  #canvas {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: wrap;
  }
  #canvas img {
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  #canvas .space { display: inline-block; }
  #canvas .missing {
    font-size: 60px;
    opacity: 0.3;
    align-self: center;
  }
  footer { padding: 14px 28px; font-size: 12px; opacity: 0.5; }
</style>
</head>
<body>
<header>
  <h1>Liquid Chrome Composer</h1>
  <input id="text" type="text" value="iykyk" autocomplete="off" spellcheck="false"
         placeholder="type a word… (a-z, 0-9)">
  <label>Size <input id="size" type="range" min="40" max="260" value="140"></label>
  <label>Spacing <input id="spacing" type="range" min="-30" max="60" value="4"></label>
  <button id="toggle">Toggle background</button>
</header>
<main><div id="canvas"></div></main>
<footer>Glyphs: glyphs/png/*.png &middot; lowercase a&ndash;z and 0&ndash;9 are available; other characters are skipped.</footer>
<script>
  // Vertical metrics per glyph — identical to scripts/build_font.py.
  // h: height relative to the base size, dy: shift below the baseline
  // (fraction of base size). dy is derived from the PNG alpha masks
  // (scripts/derive_metrics.py): glyph bodies rest on the baseline,
  // descenders (g j p q y) dip below only as far as their measured tail.
  const METRICS = {
    a: { h: 1.00, dy: 0.02 }, b: { h: 1.45, dy: 0.02 }, c: { h: 1.05, dy: 0.02 },
    d: { h: 1.30, dy: 0.02 }, e: { h: 1.05, dy: 0.02 }, f: { h: 1.55, dy: 0.02 },
    g: { h: 1.35, dy: 0.05 }, h: { h: 1.40, dy: 0.02 }, i: { h: 1.30, dy: 0.02 },
    j: { h: 1.45, dy: 0.03 }, k: { h: 1.35, dy: 0.02 }, l: { h: 1.25, dy: 0.02 },
    m: { h: 1.00, dy: 0.02 }, n: { h: 1.00, dy: 0.02 }, o: { h: 1.05, dy: 0.02 },
    p: { h: 1.30, dy: 0.14 }, q: { h: 1.30, dy: 0.06 }, r: { h: 1.05, dy: 0.02 },
    s: { h: 1.10, dy: 0.02 }, t: { h: 1.40, dy: 0.02 }, u: { h: 1.00, dy: 0.02 },
    v: { h: 1.05, dy: 0.02 }, w: { h: 1.05, dy: 0.02 }, x: { h: 1.10, dy: 0.02 },
    y: { h: 1.30, dy: 0.04 }, z: { h: 0.95, dy: 0.02 },
    0: { h: 1.35, dy: 0.02 }, 1: { h: 1.40, dy: 0.02 }, 2: { h: 1.35, dy: 0.02 },
    3: { h: 1.40, dy: 0.02 }, 4: { h: 1.45, dy: 0.02 }, 5: { h: 1.35, dy: 0.02 },
    6: { h: 1.40, dy: 0.02 }, 7: { h: 1.50, dy: 0.02 }, 8: { h: 1.40, dy: 0.02 },
    9: { h: 1.45, dy: 0.02 }
  };
  const GLYPH_DIR = "../glyphs/png/";

  const canvas = document.getElementById("canvas");
  const textInput = document.getElementById("text");
  const sizeInput = document.getElementById("size");
  const spacingInput = document.getElementById("spacing");

  function render() {
    const base = parseInt(sizeInput.value, 10);
    const spacing = parseInt(spacingInput.value, 10);
    canvas.innerHTML = "";
    for (const ch of textInput.value.toLowerCase()) {
      if (ch === " ") {
        const sp = document.createElement("span");
        sp.className = "space";
        sp.style.width = base * 0.45 + "px";
        canvas.appendChild(sp);
        continue;
      }
      const m = METRICS[ch];
      if (!m) {
        const unknown = document.createElement("span");
        unknown.className = "missing";
        unknown.textContent = ch;
        canvas.appendChild(unknown);
        continue;
      }
      const img = document.createElement("img");
      img.src = GLYPH_DIR + ch + ".png";
      img.alt = ch;
      img.style.height = base * m.h + "px";
      img.style.marginBottom = -base * m.dy + "px";
      img.style.marginRight = spacing + "px";
      canvas.appendChild(img);
    }
  }

  textInput.addEventListener("input", render);
  sizeInput.addEventListener("input", render);
  spacingInput.addEventListener("input", render);
  document.getElementById("toggle").addEventListener("click", () => {
    document.body.classList.toggle("cream");
  });
  render();
</script>
</body>
</html>

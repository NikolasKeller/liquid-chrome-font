<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Chrome – Demo</title>
<link rel="stylesheet" href="../css/liquid-chrome.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  section { padding: 70px 40px; text-align: center; }
  .dark { background: #000; color: #eee; }
  .light { background: #e8e4dc; color: #1a1a1a; }
  h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.55; margin-bottom: 28px; }
  .headline { font-size: clamp(56px, 11vw, 150px); line-height: 1.1; }
  .sub { font-size: clamp(22px, 4vw, 44px); margin-top: 10px; }
  .png-row { display: flex; justify-content: center; align-items: flex-end; }
  .png-row img { height: clamp(70px, 13vw, 170px); margin-right: 6px; }
  .png-row img.desc { margin-bottom: calc(clamp(70px, 13vw, 170px) * -0.23); height: calc(clamp(70px, 13vw, 170px) * 1.3); }
  a.button {
    display: inline-block; margin-top: 40px; padding: 12px 22px;
    border: 1px solid currentColor; border-radius: 999px;
    color: inherit; text-decoration: none; font-size: 14px; opacity: 0.8;
  }
  a.button:hover { opacity: 1; }
</style>
</head>
<body>

<!-- Gloss filters: specular lighting shades each stroke like a rounded
     metal tube. Copy these defs into any page using .liquid-chrome--gloss. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="liquid-chrome-gloss" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Dark pooled rim along the lower edges of each stroke. -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="soft"/>
      <feOffset in="soft" dx="-1" dy="-7" result="up"/>
      <feComposite in="SourceAlpha" in2="up" operator="out" result="rimA"/>
      <feFlood flood-color="#050507" flood-opacity="0.9"/>
      <feComposite in2="rimA" operator="in" result="rimDark"/>
      <feGaussianBlur in="rimDark" stdDeviation="2.2" result="rim"/>
      <feComposite in="rim" in2="SourceGraphic" operator="over" result="shaded"/>
      <!-- Broad soft sheen across the rounded stroke surface. -->
      <feSpecularLighting in="soft" surfaceScale="8" specularConstant="0.45"
                          specularExponent="9" lighting-color="#ffffff" result="sheen">
        <feDistantLight azimuth="235" elevation="55"/>
      </feSpecularLighting>
      <feComposite in="shaded" in2="sheen" operator="arithmetic"
                   k1="0" k2="1" k3="0.55" k4="0" result="s2"/>
      <!-- Tight liquid hot-spots. -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="tight"/>
      <feSpecularLighting in="tight" surfaceScale="5" specularConstant="1.5"
                          specularExponent="60" lighting-color="#ffffff" result="hot">
        <feDistantLight azimuth="230" elevation="58"/>
      </feSpecularLighting>
      <feComposite in="s2" in2="hot" operator="arithmetic"
                   k1="0" k2="1" k3="1" k4="0" result="s3"/>
      <feComposite in="s3" in2="SourceAlpha" operator="in"/>
    </filter>
    <filter id="liquid-chrome-gloss-small" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="soft"/>
      <feOffset in="soft" dx="-0.5" dy="-3" result="up"/>
      <feComposite in="SourceAlpha" in2="up" operator="out" result="rimA"/>
      <feFlood flood-color="#050507" flood-opacity="0.85"/>
      <feComposite in2="rimA" operator="in" result="rimDark"/>
      <feGaussianBlur in="rimDark" stdDeviation="1" result="rim"/>
      <feComposite in="rim" in2="SourceGraphic" operator="over" result="shaded"/>
      <feSpecularLighting in="soft" surfaceScale="4" specularConstant="0.4"
                          specularExponent="8" lighting-color="#ffffff" result="sheen">
        <feDistantLight azimuth="235" elevation="55"/>
      </feSpecularLighting>
      <feComposite in="shaded" in2="sheen" operator="arithmetic"
                   k1="0" k2="1" k3="0.5" k4="0" result="s2"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.9" result="tight"/>
      <feSpecularLighting in="tight" surfaceScale="2.5" specularConstant="1.3"
                          specularExponent="50" lighting-color="#ffffff" result="hot">
        <feDistantLight azimuth="230" elevation="58"/>
      </feSpecularLighting>
      <feComposite in="s2" in2="hot" operator="arithmetic"
                   k1="0" k2="1" k3="1" k4="0" result="s3"/>
      <feComposite in="s3" in2="SourceAlpha" operator="in"/>
    </filter>
  </defs>
</svg>

<section class="dark">
  <h2>Color font &middot; real chrome texture, just type</h2>
  <div class="headline liquid-chrome-color">iykyk</div>
  <div class="sub liquid-chrome-color">liquid chrome 0123456789</div>
</section>

<section class="dark">
  <h2>Webfont + CSS effect &middot; dark</h2>
  <div class="headline liquid-chrome liquid-chrome--gloss">iykyk</div>
  <div class="sub liquid-chrome liquid-chrome--gloss-small">liquid chrome 0123456789</div>
</section>

<section class="light">
  <h2>Webfont + CSS effect &middot; light</h2>
  <div class="headline liquid-chrome liquid-chrome--light liquid-chrome--gloss">iykyk</div>
  <div class="sub liquid-chrome liquid-chrome--light liquid-chrome--gloss-small">liquid chrome 0123456789</div>
</section>

<section class="dark">
  <h2>PNG glyphs &middot; pixel-perfect</h2>
  <div class="png-row">
    <img src="../glyphs/png/i.png" alt="i">
    <img src="../glyphs/png/y.png" alt="y" class="desc">
    <img src="../glyphs/png/k.png" alt="k">
    <img src="../glyphs/png/y.png" alt="y" class="desc">
    <img src="../glyphs/png/k.png" alt="k">
  </div>
  <a class="button" href="composer.html">Open the glyph composer &rarr;</a>
</section>

</body>
</html>
